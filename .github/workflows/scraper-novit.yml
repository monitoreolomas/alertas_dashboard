name: Scraper Novit (XLS)

on:
  schedule:
    - cron: "0 6 * * *"   # todos los días a las 06:00 UTC (03:00 Argentina)
  workflow_dispatch:        # también permite correrlo manualmente

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── PASO 1: Scraper XLS (Playwright) ───────────────────────────────────
      - name: Instalar dependencias (raíz)
        run: npm install

      - name: Instalar Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Correr scraper
        run: node sync/scraper-novit.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOVIT_USER:           ${{ secrets.NOVIT_USER }}
          NOVIT_PASS:           ${{ secrets.NOVIT_PASS }}

      # ── PASO 2: Sync API (escribe app_type por grupo) ──────────────────────
      - name: Instalar dependencias (sync)
        run: npm install
        working-directory: sync

      - name: Correr sync full (app_type)
        run: node sync-usuarios.js --full
        working-directory: sync
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOVIT_TOKEN:          ${{ secrets.NOVIT_TOKEN }}

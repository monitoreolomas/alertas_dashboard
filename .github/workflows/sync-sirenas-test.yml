name: Sync Sirenas

on:
  schedule:
    - cron: '0 2 * * *'  # Todos los días a las 2am UTC (11pm Argentina)
  workflow_dispatch:       # También se puede correr manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install @supabase/supabase-js node-fetch dotenv ws

      - name: Correr sync-sirenas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOVIT_TOKEN: ${{ secrets.NOVIT_TOKEN }}
        run: node sync-sirenas.mjs

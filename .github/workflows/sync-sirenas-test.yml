name: sync-sirenas-test
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: sync
      - name: Dry run sirenas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOVIT_TOKEN: ${{ secrets.NOVIT_TOKEN }}
        run: node sync/sync-sirenas.mjs --dry-run

name: Sync Full Usuarios

on:
  schedule:
    - cron: "0 1 * * *"   # 22:00 Argentina (UTC-3)
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sync/package.json

      - name: Install dependencies
        working-directory: sync
        run: npm install

      - name: Install Playwright browsers
        working-directory: sync
        run: npx playwright install chromium --with-deps

      - name: Run sync
        working-directory: sync
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOVIT_TOKEN:          ${{ secrets.NOVIT_TOKEN }}
          NOVIT_USER:           ${{ secrets.NOVIT_USER }}
          NOVIT_PASS:           ${{ secrets.NOVIT_PASS }}
        run: node sync-full.mjs
